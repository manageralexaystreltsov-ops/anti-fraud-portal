<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тест: попали ли вы в мошенническую схему? — AntiFrog</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="section" style="padding-top:32px">
  <div class="container" style="max-width:600px">

    <div id="quizStart" class="card card-lg text-center">
      <div style="font-size:48px;margin-bottom:16px">🧪</div>
      <h1 style="font-size:24px;font-weight:900;margin-bottom:12px">Попали ли вы в мошенническую схему?</h1>
      <p style="color:var(--muted);margin-bottom:24px">Ответьте на 7 вопросов. Это бесплатно и анонимно.</p>
      <button onclick="startQuiz()" class="btn btn-primary btn-lg" style="margin:0 auto">Начать тест</button>
    </div>

    <div id="quizProcess" class="hidden">
      <div class="progress-bar"><div class="progress-fill" id="quizProgress"></div></div>
      <div id="quizStepInfo" style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:16px"></div>
      <div class="card card-lg" id="quizQuestion"></div>
    </div>

    <div id="quizResult" class="hidden card card-lg">
      <div class="quiz-result" id="quizResultContent"></div>
    </div>

  </div>
</section>

<script src="js/common.js"></script>
<script>
const QUESTIONS = [
  { q: 'Как вас нашли мошенники?', options: ['Telegram / WhatsApp','Знакомый посоветовал','Реклама в интернете','Соцсети (Instagram, TikTok)','Звонок с неизвестного номера'] },
  { q: 'Что они обещали?', options: ['Гарантированный доход 20-40% в месяц','Бесплатную консультацию','Помощь в возврате потерянных денег','Инвестиции в криптовалюту','Работу трейдером'] },
  { q: 'Сколько денег вы вложили / потеряли?', options: ['До 100 000 ₸','100 000 — 500 000 ₸','500 000 — 1 000 000 ₸','1 000 000 — 5 000 000 ₸','Более 5 000 000 ₸'] },
  { q: 'Пробовали ли вы вывести деньги?', options: ['Да, но отказали','Да, попросили заплатить комиссию','Нет, ещё не пробовал','Не могу зайти в кабинет','Платформа исчезла'] },
  { q: 'Просили ли вас доплатить «для вывода»?', options: ['Да, за верификацию','Да, за «налог»','Да, за «комиссию регулятора»','Да, несколько раз','Нет, не просили'] },
  { q: 'Звонил ли вам «юрист» или «регулятор»?', options: ['Да, из WhatsApp','Да, по телефону','Да, присылал PDF-документы','Нет, никто не звонил','Не уверен'] },
  { q: 'Говорили ли вам «не говорите родственникам»?', options: ['Да','Нет','Не помню','Мне не говорили, но я сам(а) скрывал(а)]'] }
];

let currentQ = 0, answers = [];

function startQuiz() {
  document.getElementById('quizStart').classList.add('hidden');
  document.getElementById('quizProcess').classList.remove('hidden');
  currentQ = 0; answers = [];
  showQuestion();
}

function showQuestion() {
  if (currentQ >= QUESTIONS.length) { finishQuiz(); return; }
  const q = QUESTIONS[currentQ];
  document.getElementById('quizProgress').style.width = ((currentQ / QUESTIONS.length) * 100) + '%';
  document.getElementById('quizStepInfo').textContent = `Вопрос ${currentQ + 1} из ${QUESTIONS.length}`;
  document.getElementById('quizQuestion').innerHTML = `
    <div class="quiz-question">
      <h3>${q.q}</h3>
      ${q.options.map((o, i) => `<button class="quiz-option" onclick="selectAnswer(${i})">${o}</button>`).join('')}
    </div>`;
}

function selectAnswer(idx) {
  answers.push(QUESTIONS[currentQ].options[idx]);
  currentQ++;
  showQuestion();
}

function finishQuiz() {
  document.getElementById('quizProcess').classList.add('hidden');
  document.getElementById('quizResult').classList.remove('hidden');
  document.getElementById('quizProgress').style.width = '100%';

  // Simple scoring
  let score = 0;
  if (answers[1]?.includes('20-40%') || answers[1]?.includes('криптовалюту')) score += 2;
  if (answers[3]?.includes('отказали') || answers[3]?.includes('комиссию')) score += 2;
  if (answers[4]?.includes('Да')) score += 2;
  if (answers[5]?.includes('WhatsApp') || answers[5]?.includes('PDF')) score += 1;
  if (answers[6]?.includes('Да')) score += 1;

  let result, color, advice;
  if (score >= 5) {
    result = 'Вы в зоне риска!'; color = 'var(--red)';
    advice = 'Похоже, вы столкнулись с мошеннической схемой. Не платите больше. Оставьте заявку — мы поможем.';
  } else if (score >= 3) {
    result = 'Возможно, вас обманывают'; color = 'var(--gold)';
    advice = 'Есть признаки мошенничества. Будьте осторожны и проконсультируйтесь с нашим юристом.';
  } else {
    result = 'Пока всё спокойно'; color = 'var(--green)';
    advice = 'Серьёзных признаков мошенничества не обнаружено. Но будьте внимательны.';
  }

  document.getElementById('quizResultContent').innerHTML = `
    <div class="quiz-result-icon">${score >= 5 ? '⚠️' : score >= 3 ? '🤔' : '✅'}</div>
    <h2 style="color:${color}">${result}</h2>
    <p style="color:var(--muted);margin-bottom:24px;max-width:400px;margin-left:auto;margin-right:auto">${advice}</p>
    <div style="text-align:left;background:var(--card);border-radius:12px;padding:16px;margin-bottom:24px">
      <p style="font-size:13px;font-weight:700;margin-bottom:8px">Ваши ответы:</p>
      ${answers.map((a, i) => `<p style="font-size:12px;color:var(--muted);margin-bottom:4px">• ${a}</p>`).join('')}
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;align-items:center">
      <a href="/apply.html" class="btn btn-primary btn-lg" style="margin:0 auto">📝 Оставить заявку</a>
      <button onclick="resetQuiz()" class="btn btn-outline btn-sm" style="margin:0 auto">Пройти тест заново</button>
    </div>`;

  // Send to Telegram
  const msg = `🧪 *РЕЗУЛЬТАТ ТЕСТА AntiFrog*
Результат: ${result}
Балл: ${score}/8

Ответы:
${answers.map((a, i) => `${i + 1}. ${a}`).join('\n')}`;
  sendToTelegram(msg);
}

function resetQuiz() {
  document.getElementById('quizResult').classList.add('hidden');
  document.getElementById('quizStart').classList.remove('hidden');
}
</script>
</body>
</html>
