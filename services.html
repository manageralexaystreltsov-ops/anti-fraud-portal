<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Услуги — AntiFrog</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="section" style="padding-top:32px">
  <div class="container" style="max-width:700px">
    <div class="text-center" style="margin-bottom:32px">
      <h1 style="font-size:28px;font-weight:900">💼 Наши услуги</h1>
      <p style="color:var(--muted);font-size:15px">Полный цикл помощи пострадавшим</p>
    </div>

    <div class="space-y" id="servicesList"></div>

    <div class="card card-lg text-center" style="margin-top:32px">
      <h2 style="font-size:24px;font-weight:900;margin-bottom:12px">Не знаете, что выбрать?</h2>
      <p style="color:var(--muted);margin-bottom:20px">Оставьте заявку — мы бесплатно определим что вам нужно</p>
      <a href="/apply.html" class="btn btn-primary btn-lg" style="margin:0 auto">📝 Оставить заявку</a>
    </div>
  </div>
</section>

<script src="js/common.js"></script>
<script>
const SERVICES = [
  {icon:'🔍',title:'Проверка компании',price:'Бесплатно',items:['Проверка лицензии АРРФР','Анализ возраста домена','Поиск жалоб','Определение юрисдикции']},
  {icon:'⚖️',title:'Бесплатная консультация',price:'Бесплатно',items:['Определение стадии обмана','Объяснение ситуации','План действий','Рекомендации']},
  {icon:'📋',title:'Сбор доказательств',price:'По запросу',items:['Анализ скриншотов','Оценка документов','Подготовка пакета','Фиксация доказательств']},
  {icon:'🏛️',title:'Жалоба в АРРФР',price:'от 45 000 ₸',items:['Составление жалобы','Подача через finreg.kz','Контроль рассмотрения','Получение ответа']},
  {icon:'💳',title:'Чарджбэк',price:'от 35 000 ₸',items:['Анализ транзакций','Заявление в банк','Контроль возврата','Обжалование отказа']},
  {icon:'🚔',title:'Заявление в полицию',price:'от 25 000 ₸',items:['Составление заявления','Подача в полицию','Контроль возбуждения','Сопровождение']},
  {icon:'⚖️',title:'Юридическое сопровождение',price:'По договору',items:['Претензии и иски','Представительство','Взаимодействие с банками','Контроль решений']},
  {icon:'💰',title:'Полный возврат',price:'Гонорар успеха',items:['Полный цикл','Все органы','Мониторинг','Отчётность','Гарантия']}
];

document.getElementById('servicesList').innerHTML = SERVICES.map(s => `
  <div class="card" style="padding:20px">
    <div style="display:flex;align-items:start;gap:16px">
      <span style="font-size:32px;flex-shrink:0">${s.icon}</span>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <h3 style="font-size:18px;font-weight:700">${s.title}</h3>
          <span style="font-size:12px;padding:4px 10px;background:rgba(16,185,129,0.1);color:var(--green);border-radius:8px;font-weight:600">${s.price}</span>
        </div>
        <ul style="list-style:none;display:flex;flex-direction:column;gap:4px">
          ${s.items.map(i => `<li style="font-size:13px;color:var(--muted);padding-left:16px;position:relative"><span style="position:absolute;left:0;color:var(--green)">•</span>${i}</li>`).join('')}
        </ul>
        <a href="/apply.html" class="btn btn-primary btn-sm" style="margin-top:12px;max-width:200px">Обратиться</a>
      </div>
    </div>
  </div>
`).join('');
</script>
</body>
</html>
