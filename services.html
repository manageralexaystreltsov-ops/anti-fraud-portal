<section class="section" style="padding-top:24px;position:relative">
  <canvas id="particlesBg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none"></canvas>
  <div class="container" style="max-width:700px">
    <div class="text-center" style="margin-bottom:20px">
      <h1 style="font-size:24px;font-weight:900">💼 Услуги</h1>
      <p style="color:var(--muted);font-size:14px">Полный спектр услуг по возврату активов</p>
    </div>

    <div class="card" style="display:flex;gap:8px;padding:8px;margin-bottom:16px">
      <input type="text" class="form-input" id="serviceSearch" placeholder="Поиск услуги..." style="border:none;background:none;flex:1" oninput="filterServices()">
    </div>

    <div style="font-size:12px;color:var(--muted);margin-bottom:12px" id="serviceCount"></div>

    <div class="services-grid" id="servicesList"></div>

    <div class="card card-lg text-center" style="margin-top:24px">
      <h2 style="font-size:20px;font-weight:900;margin-bottom:8px">Не нашли нужное?</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:16px">Оставьте заявку — подберём решение</p>
      <a href="/anti-fraud-portal/apply.html" class="btn btn-primary" style="margin:0 auto">📝 Обратиться</a>
    </div>
  </div>
</section>

<!-- ORDER MODAL -->
<div class="ck-modal-overlay hidden" id="orderModal" onclick="closeOrderModal()">
  <div class="ck-modal" onclick="event.stopPropagation()" style="max-height:85vh">
    <div class="ck-modal-handle"></div>
    <div class="ck-smodal-head">
      <div style="display:flex;align-items:center;gap:10px">
        <span id="orderIcon" style="font-size:24px"></span>
        <h2 id="orderTitle"></h2>
      </div>
      <button class="ck-mclose" onclick="closeOrderModal()">✕</button>
    </div>
    <div class="ck-smodal-body">
      <div class="svc-price-block">
        <div class="svc-price" id="orderPrice"></div>
        <div class="svc-note">Оплата после оказания услуги</div>
      </div>
      <div class="svc-form">
        <div class="form-group"><label class="form-label">Ваше имя *</label><input class="form-input" id="orderName" placeholder="Фамилия Имя"></div>
        <div class="form-group"><label class="form-label">Телефон *</label><input class="form-input" id="orderPhone" placeholder="+7 (7__) ___-__-__"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="orderEmail" placeholder="email@example.com"></div>
        <div class="form-group"><label class="form-label">Комментарий</label><textarea class="form-input" id="orderComment" rows="3" placeholder="Опишите вашу ситуацию..."></textarea></div>
      </div>
      <div class="svc-pay-methods">
        <div class="svc-pay-title">Способ оплаты</div>
        <div class="svc-pay-options">
          <button class="svc-pay-opt active" onclick="selectPayOpt(this)">💳 Карта</button>
          <button class="svc-pay-opt" onclick="selectPayOpt(this)">📱 SBP</button>
          <button class="svc-pay-opt" onclick="selectPayOpt(this)">🏦 Счёт</button>
        </div>
      </div>
      <button class="btn btn-primary btn-lg" style="width:100%;margin-top:16px" onclick="submitOrder()">Оплатить и заказать</button>
      <div class="svc-secure">🔒 Безопасная оплата · SSL · 3-D Secure</div>
    </div>
  </div>
</div>

  {icon:'📞',cat:'Дополнительные',title:'Обращение в Генпрокуратуру',desc:'Жалоба в Генеральную прокуратуру',price:'от 45 000 ₸'},
  {icon:'📞',cat:'Дополнительные',title:'Обращение в МИД',desc:'Заявление в Министерство иностранных дел',price:'от 60 000 ₸'},
  {icon:'📞',cat:'Дополнительные',title:'Обращение в Межпарламентскую ассамблею',desc:'Обращение в МПА ОБСЕ',price:'от 300 000 ₸'},
];

let allServices = SERVICES;

function renderServices(list) {
  document.getElementById('serviceCount').textContent = `Показано: ${list.length} из ${SERVICES.length} услуг`;
  document.getElementById('servicesList').innerHTML = list.map((s,i) => `
    <div class="service-item svc-clickable" onclick="orderService('${s.title.replace(/'/g,"\\'")}','${s.price}','${s.icon}')">
      <div class="service-icon">${s.icon}</div>
      <div class="service-info">
        <div class="service-title">${s.title}</div>
        <div class="service-desc">${s.desc}</div>
      </div>
      <div class="service-price">${s.price}</div>
    </div>
  `).join('');
}

function filterServices() {
  const q = document.getElementById('serviceSearch').value.trim().toLowerCase();
  if (!q) { renderServices(allServices); return; }
  renderServices(allServices.filter(s => s.title.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q)));
}

renderServices(allServices);

// ORDER
function orderService(title,price,icon){
  document.getElementById('orderTitle').textContent=title;
  document.getElementById('orderPrice').textContent=price;
  document.getElementById('orderIcon').textContent=icon;
  document.getElementById('orderModal').classList.remove('hidden');
  document.body.style.overflow='hidden';
  gsap.set('#orderModal .ck-modal',{y:'100%'});
  gsap.to('#orderModal .ck-modal',{y:0,duration:0.4,ease:'power3.out'});
}
function closeOrderModal(){
  gsap.to('#orderModal .ck-modal',{y:'100%',duration:0.3,ease:'power3.in',onComplete:()=>{
    document.getElementById('orderModal').classList.add('hidden');
    document.body.style.overflow='';
  }});
}
function selectPayOpt(btn){document.querySelectorAll('.svc-pay-opt').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function submitOrder(){
  const name=document.getElementById('orderName').value.trim();
  const phone=document.getElementById('orderPhone').value.trim();
  if(!name||!phone){showToast('Заполните имя и телефон','error');return;}
  showToast('Заявка на услугу отправлена!');
  closeOrderModal();
}
</script>
