<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Проверить дело — AntiFrog</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="section" style="padding-top:32px">
  <div class="container" style="max-width:700px">
    <div class="text-center" style="margin-bottom:24px">
      <h1 style="font-size:28px;font-weight:900">📋 Проверка дела</h1>
      <p style="color:var(--muted);font-size:15px">Введите номер дела, ФИО или ИНН</p>
    </div>

    <div class="card" style="display:flex;gap:8px;padding:8px;margin-bottom:24px">
      <input type="text" class="form-input" id="searchInput" placeholder="Номер, ФИО или ИНН" style="border:none;background:none;flex:1">
      <button onclick="search()" class="btn btn-primary btn-sm" style="max-width:120px">Найти</button>
    </div>

    <div id="results"></div>
    <div id="empty" class="text-center" style="padding:40px 0">
      <div style="font-size:48px;margin-bottom:12px">📋</div>
      <p style="color:var(--muted)">Введите данные для поиска</p>
    </div>
  </div>
</section>

<script src="js/common.js"></script>
<script>
const STAGE_NAMES = {'Заявка':'Заявка','Анализ':'Анализ','Претензия':'Претензия','Возврат':'Возврат'};
const ALL_STAGES = ['Заявка','Анализ','Претензия','Возврат'];

function maskIIN(iin) { return iin && iin.length >= 6 ? iin.slice(0,3) + '***' + iin.slice(-3) : iin; }
function maskPhone(p) { const c = p?.replace(/\D/g,''); return c && c.length >= 7 ? '+7(***)***-' + c.slice(-2) : p; }

function search() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) return;
  const cases = getCases();
  const found = Object.entries(cases).filter(([n, c]) =>
    n.toLowerCase().includes(q) || c.fullName?.toLowerCase().includes(q) || c.iin?.includes(q)
  );
  document.getElementById('empty').style.display = found.length ? 'none' : 'block';
  document.getElementById('results').innerHTML = found.map(([num, c]) => {
    const si = ALL_STAGES.indexOf(c.stage);
    return `<div class="case-card">
      <div class="case-header"><div class="case-dot"></div><span class="case-status">${c.status}</span></div>
      <h3 style="font-size:18px;font-weight:700;margin-bottom:4px">Дело #${num}</h3>
      <p style="color:var(--muted);font-size:14px;margin-bottom:16px">${c.platform || ''}</p>
      <div class="case-progress">
        <div class="case-progress-header"><span>Прогресс</span><span>${c.progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${c.progress}%"></div></div>
      </div>
      <div class="case-stages">${ALL_STAGES.map((s,i) =>
        `<div class="case-stage"><div class="case-stage-dot ${i<si?'done':i===si?'active':''}"></div><span class="case-stage-label">${s}</span></div>`
      ).join('')}</div>
      <div class="case-details">
        <div class="case-detail"><div class="case-detail-label">ФИО</div><div class="case-detail-value">${c.fullName||'—'}</div></div>
        <div class="case-detail"><div class="case-detail-label">ИИН</div><div class="case-detail-value">${maskIIN(c.iin)}</div></div>
        <div class="case-detail"><div class="case-detail-label">Телефон</div><div class="case-detail-value">${maskPhone(c.phone)}</div></div>
        <div class="case-detail"><div class="case-detail-label">Этап</div><div class="case-detail-value">${c.stage}</div></div>
      </div>
      <div class="case-comments"><h4>Комментарии</h4>
        ${(c.comments||[]).map(cm => `<div class="comment"><div class="comment-date">${cm.date}</div><div class="comment-text">${cm.text}</div></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
const p = new URLSearchParams(location.search);
if (p.get('case')) { document.getElementById('searchInput').value = p.get('case'); search(); }
</script>
</body>
</html>
