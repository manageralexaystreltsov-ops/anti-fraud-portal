<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Проверить дело — AntiFrog</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<body>

<section class="section" style="padding-top:24px">
  <div class="container" style="max-width:1100px">

    <div class="section-header" style="margin-bottom:24px">
      <h1 style="font-size:clamp(22px,4vw,32px);font-weight:900">📋 Проверка дела</h1>
      <p style="color:var(--muted);font-size:14px">Введите номер дела, ФИО или ИНН</p>
    </div>

    <!-- SEARCH -->
    <div class="search-block" id="searchBlock">
      <div class="search-input-wrap">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Номер дела, ФИО, ИНН...">
        <button onclick="startSearch()" class="search-btn" id="searchBtn">Найти</button>
      </div>
    </div>

    <!-- SEARCH ANIMATION -->
    <div class="search-loading hidden" id="searchLoading">
      <div class="loading-header">
        <div class="loading-spinner"></div>
        <span id="loadingText">Подключение к базам данных...</span>
      </div>
      <div class="loading-steps" id="loadingSteps"></div>
      <div class="progress-bar"><div class="progress-fill" id="loadingProgress" style="width:0%"></div></div>
    </div>

    <!-- RESULTS INFO -->
    <div class="results-info hidden" id="resultsInfo">
      <span id="resultCount"></span>
      <div class="filter-chips" id="filterChips">
        <button class="filter-chip active" onclick="filterByStatus('all',this)">Все</button>
        <button class="filter-chip" onclick="filterByStatus('На рассмотрении',this)">⏳ На рассмотрении</button>
        <button class="filter-chip" onclick="filterByStatus('В работе',this)">🔵 В работе</button>
        <button class="filter-chip" onclick="filterByStatus('Завершено',this)">✅ Завершено</button>
      </div>
    </div>

    <!-- CLIENTS TABLE -->
    <div class="clients-table-wrap hidden" id="clientsTable">
      <table class="clients-table">
        <thead>
          <tr>
            <th>Дело</th>
            <th>Клиент</th>
            <th>Платформа</th>
            <th class="th-hide">Город</th>
            <th>Статус</th>
            <th class="th-hide">Прогресс</th>
          </tr>
        </thead>
        <tbody id="clientsBody"></tbody>
      </table>
    </div>

    <!-- SKELETON -->
    <div class="skeleton-list hidden" id="skeletonList">
      <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div><div class="skeleton-badge"></div></div>
      <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line w70"></div><div class="skeleton-line w30"></div></div><div class="skeleton-badge"></div></div>
      <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line w50"></div><div class="skeleton-line w45"></div></div><div class="skeleton-badge"></div></div>
      <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line w65"></div><div class="skeleton-line w35"></div></div><div class="skeleton-badge"></div></div>
      <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line w55"></div><div class="skeleton-line w40"></div></div><div class="skeleton-badge"></div></div>
    </div>

  </div>
</section>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal" style="display:none" onclick="closeDetail(event)">
  <div class="detail-modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>

    <!-- HEADER -->
    <div class="detail-header" id="detailHeader"></div>

    <!-- TABS -->
    <div class="detail-tabs" id="detailTabs">
      <button class="detail-tab active" onclick="showDetailTab('overview',this)">📊 Обзор</button>
      <button class="detail-tab" onclick="showDetailTab('funds',this)">💰 Движение средств</button>
      <button class="detail-tab" onclick="showDetailTab('docs',this)">📄 Документы</button>
      <button class="detail-tab" onclick="showDetailTab('finance',this)">📈 Итоги</button>
      <button class="detail-tab" onclick="showDetailTab('comments',this)">💬 История</button>

    <!-- TAB CONTENT -->

    <!-- FOOTER -->
    <div class="detail-footer">
      <div class="security-badges">
        <span class="sec-badge">🔒 256-bit SSL</span>
        <span class="sec-badge">🛡️ GDPR Compliant</span>
      </div>
    </div>
  </div>
</div>

<script src="js/common.js"></script>

function genClients(count) {
  const arr = [];
  const cases = getCases();
  Object.entries(cases).forEach(([num, c]) => {
    arr.push({
      num, fullName: c.fullName || 'Без имени',
      phone: c.phone || '', platform: c.platform || '',
      stage: c.stage || 'Заявка', status: c.status || 'На рассмотрении',
      progress: c.progress || 0, city: '', amount: c.amount || 0,
      date: c.time ? new Date(c.time).toLocaleDateString('ru-RU') : '',
      comments: c.comments || [], _real: true
    });
  });
  for (let i = arr.length; i < count; i++) {
    const f = FIRST_NAMES[Math.floor(Math.random()*FIRST_NAMES.length)];
    const l = LAST_NAMES[Math.floor(Math.random()*LAST_NAMES.length)];
    const p = '+7 (' + (700+Math.floor(Math.random()*100)) + ') ' + String(Math.floor(1000000+Math.random()*9000000)).replace(/(\d{3})(\d{2})(\d{2})/,'$1-$2-$3');
    const st = STATUSES_COLORS;
    const keys = Object.keys(st);
    const prog = Math.floor(Math.random()*100);
    const status = prog>=80?'Завершено':prog>=40?'В работе':keys[Math.floor(Math.random()*keys.length)];
    const amount = Math.floor(1500000+Math.random()*498500000);
    arr.push({
      num: 'AF-'+String(1000+i).padStart(4,'0')+String.fromCharCode(65+Math.floor(Math.random()*6))+String.fromCharCode(65+Math.floor(Math.random()*6)),
      fullName: l+' '+f+' '+FIRST_NAMES[Math.floor(Math.random()*FIRST_NAMES.length)]+'ович',
      phone: p, platform: PLATFORMS[Math.floor(Math.random()*PLATFORMS.length)],
      stage: STAGES[Math.floor(Math.random()*STAGES.length)],
      status, progress: prog, city: CITIES[Math.floor(Math.random()*CITIES.length)],
      amount, date: new Date(2025,Math.floor(Math.random()*12),1+Math.floor(Math.random()*28)).toLocaleDateString('ru-RU'),
      comments: [{date:new Date().toLocaleDateString('ru-RU'),text:'Заявка получена'}]
    });
  }
  return arr;
}

let ALL_CLIENTS = [];
let filteredClients = [];
let currentFilter = 'all';

function maskFullName(name) {
  const parts = name.split(' ');
  if (parts.length < 2) return name;
  return parts[0] + ' ' + parts[1][0] + '.' + (parts[2] ? ' ' + parts[2][0] + '.' : '');
}

function maskPhone(p) {
  if (!p) return '***';
  const d = p.replace(/\D/g, '');
  if (d.length <= 7) return p;
  const keep = d.length - 4;
  let result = '', masked = 0;
  for (let i = 0; i < p.length; i++) {
    if (/\d/.test(p[i])) {
      if (masked < keep - 1) { result += p[i]; masked++; }
      else if (masked >= keep) result += p[i];
      else { result += '*'; masked++; }
    } else result += p[i];
  }
  return result;
}

function maskEmail(e) {
  if (!e) return '';
  const [user, domain] = e.split('@');
  return user[0] + '*****@' + (domain || '***');
}

// SEARCH
function startSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { renderTable(ALL_CLIENTS); return; }

  document.getElementById('clientsTable').classList.add('hidden');
  document.getElementById('resultsInfo').classList.add('hidden');
  document.getElementById('searchLoading').classList.remove('hidden');
  document.getElementById('loadingSteps').innerHTML = '';
  document.getElementById('loadingProgress').style.width = '0%';

  const steps = [
    { text: 'Подключение к АРРФР...', time: 600 },
    { text: 'Запрос в FinCEN базы...', time: 800 },
    { text: 'Проверка blockchain транзакций...', time: 700 },
    { text: 'Сверка с реестрами регуляторов...', time: 500 },
    { text: 'Анализ данных...', time: 400 },
  ];

  let i = 0;
  function nextStep() {
    if (i >= steps.length) {
      const found = ALL_CLIENTS.filter(c =>
        c.num.toLowerCase().includes(q.toLowerCase()) ||
        c.fullName.toLowerCase().includes(q.toLowerCase()) ||
        c.platform.toLowerCase().includes(q.toLowerCase())
      );
      setTimeout(() => {
        document.getElementById('searchLoading').classList.add('hidden');
        filteredClients = found;
        currentFilter = 'all';
        renderTable(found);
        document.getElementById('resultsInfo').classList.remove('hidden');
        document.getElementById('resultCount').textContent = `Найдено: ${found.length} дел`;
      }, 300);
      return;
    }
    const s = steps[i];
    document.getElementById('loadingText').textContent = s.text;
    document.getElementById('loadingSteps').innerHTML += `<div class="loading-step"><span class="step-ok">✓</span> ${s.text}</div>`;
    document.getElementById('loadingProgress').style.width = ((i+1)/steps.length*100)+'%';
    i++;
    setTimeout(nextStep, s.time);
  }
  nextStep();
}

function filterByStatus(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  const list = status === 'all' ? filteredClients : filteredClients.filter(c => c.status === status);
  renderTable(list);
}

function renderTable(list) {
  const tbody = document.getElementById('clientsBody');
  document.getElementById('clientsTable').classList.remove('hidden');
  tbody.innerHTML = list.slice(0, 50).map((c, i) => {
    const color = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const initials = c.fullName.split(' ').slice(0,2).map(n=>n[0]).join('');
    const sc = STATUSES_COLORS[c.status] || STATUSES_COLORS['На рассмотрении'];
    return `<tr onclick='openDetail(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <td><span class="td-num">#${c.num}</span></td>
      <td>
        <div class="td-client">
          <div class="td-avatar" style="background:${color}20;color:${color}">${initials}</div>
          <div><div class="td-name">${maskFullName(c.fullName)}</div><div class="td-phone">${maskPhone(c.phone)}</div></div>
        </div>
      </td>
      <td><span class="td-platform">${c.platform}</span></td>
      <td class="td-hide"><span class="td-city">${c.city || '—'}</span></td>
      <td><span class="td-status" style="background:${sc.bg};color:${sc.color}"><span class="td-status-dot" style="background:${sc.dot}"></span>${c.status}</span></td>
      <td class="td-hide"><div class="td-progress"><div class="td-progress-bar"><div class="td-progress-fill" style="width:${c.progress}%"></div></div><span>${c.progress}%</span></div></td>
    </tr>`;
  }).join('');

  gsap.from('#clientsBody tr', { opacity: 0, y: 15, duration: 0.3, stagger: 0.04 });
}

// DETAIL MODAL
let currentDetail = null;

function openDetail(c) {
  currentDetail = c;
  const color = AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)];
  const sc = STATUSES_COLORS[c.status] || STATUSES_COLORS['На рассмотрении'];
  const si = STAGES.indexOf(c.stage);

  document.getElementById('detailHeader').innerHTML = `
    <div class="detail-top">
      <div class="detail-avatar" style="background:${sc.bg};color:${sc.color}">${c.fullName.split(' ').slice(0,2).map(n=>n[0]).join('')}</div>
      <div class="detail-info">
        <h2>${maskFullName(c.fullName)}</h2>
        <div class="detail-meta">
          <span class="detail-num">#${c.num}</span>
          <button class="copy-btn" onclick="copyNum('${c.num}')">📋</button>
          <span class="detail-date">${c.date}</span>
        </div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-status-bar">
      <span class="detail-status-badge" style="background:${sc.bg};color:${sc.color}"><span class="td-status-dot" style="background:${sc.dot}"></span>${c.status}</span>
      <span class="detail-platform">📋 ${c.platform}</span>
      ${c.city ? `<span class="detail-city">📍 ${c.city}</span>` : ''}
    </div>
    <div class="detail-stages">
      ${STAGES.map((s,i) => `<div class="dstage"><div class="dstage-dot ${i<si?'done':i===si?'active':''}"></div><span>${s}</span></div>`).join('')}
    </div>
  `;

  showDetailTab('overview', document.querySelector('.detail-tab'));
  document.getElementById('detailModal').style.display = 'flex';
  gsap.from('.detail-modal', { y: '100%', duration: 0.4, ease: 'power3.out' });
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('detailModal')) return;
  gsap.to('.detail-modal', { y: '100%', duration: 0.3, ease: 'power3.in', onComplete: () => {
    document.getElementById('detailModal').style.display = 'none';
  }});
}

function copyNum(num) {
  navigator.clipboard.writeText(num);
  showToast('Номер скопирован');
}

function showDetailTab(tab, btn) {
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const c = currentDetail;
  const content = document.getElementById('detailContent');

            const dates = [c.date, '15.01.2026', '02.02.2026', '18.02.2026', '05.03.2026', '20.03.2026', '28.03.2026'];

            <div class="fund-icon">🏦</div>
            <div class="fund-label">Мошенническая платформа</div>
            <div class="fund-amount" style="color:var(--red)">${c.amount.toLocaleString()} ₸</div>
          </div>
          <div class="fund-arrow"><div class="fund-arrow-line"></div><span>→</span></div>
          <div class="fund-node fund-mid">
            <div class="fund-icon">🔄</div>
            <div class="fund-label">Промежуточные счета</div>
            <div class="fund-amount">${c.amount.toLocaleString()} ₸</div>
          </div>
          <div class="fund-arrow"><div class="fund-arrow-line"></div><span>→</span></div>
          <div class="fund-node fund-return">
            <div class="fund-icon">💳</div>
            <div class="fund-label">Карта клиента</div>
            <div class="fund-amount" style="color:var(--green)">${returned.toLocaleString()} ₸</div>
          </div>
        </div>
        <div class="fund-summary">
          <div class="fund-stat"><span>Вложено</span><strong>${c.amount.toLocaleString()} ₸</strong></div>
          <div class="fund-stat"><span>Возвращено</span><strong style="color:var(--green)">${returned.toLocaleString()} ₸</strong></div>
          <div class="fund-stat"><span>Процент возврата</span><strong style="color:var(--green)">${pct}%</strong></div>
        </div>
      </div>`;
  }

  if (tab === 'docs') {
    const docs = [
      { name: 'Заявка на возврат.pdf', status: 'Принято', date: c.date, org: 'АРРФР' },
      { name: 'Выписка по счету.pdf', status: 'Принято', date: '15.01.2026', org: 'Банк' },
      { name: 'Скриншоты переписки.pdf', status: 'Принято', date: '18.01.2026', org: 'АРРФР' },
      { name: 'Претензия в банк.docx', status: 'Отправлено', date: '02.02.2026', org: 'Bank of England' },
      { name: 'Решение суда.pdf', status: 'Ожидание', date: '05.03.2026', org: 'Верховный суд' },
    ];
    content.innerHTML = `
      <div class="detail-section">
        <h3>📄 Документы и переписка</h3>
        <div class="doc-list">
          ${docs.map(d => {
            const st = d.status==='Принято'?'done':d.status==='Отправлено'?'active':'pending';
            return `<div class="doc-item">
              <div class="doc-icon">📄</div>
              <div class="doc-info">
                <div class="doc-name">${d.name}</div>
                <div class="doc-meta">${d.org} · ${d.date}</div>
              </div>
              <span class="doc-status ${st}">${d.status}</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  if (tab === 'finance') {
    const returned = Math.floor(c.amount * (0.3 + Math.random()*0.5));
    const fee = Math.floor(returned * 0.15);
    content.innerHTML = `
      <div class="detail-section">
        <h3>📈 Финансовые результаты</h3>
        <div class="finance-table">
          <div class="fin-row"><span>Сумма вложений</span><strong>${c.amount.toLocaleString()} ₸</strong></div>
          <div class="fin-row"><span>Возвращено клиенту</span><strong style="color:var(--green)">${returned.toLocaleString()} ₸</strong></div>
          <div class="fin-row"><span>Комиссия сервиса</span><strong>${fee.toLocaleString()} ₸</strong></div>
          <div class="fin-row"><span>Дата зачисления</span><strong>**** **** **** ${String(Math.floor(1000+Math.random()*9000))}</strong></div>
        </div>
      </div>`;
  }

  if (tab === 'comments') {
    const comments = c.comments || [];
    content.innerHTML = `
      <div class="detail-section">
        <h3>💬 Комментарии и история</h3>
        <div class="comments-list">
          ${comments.map(cm => `<div class="comment-item">
            <div class="comment-avatar">👨‍💼</div>
            <div class="comment-body">
              <div class="comment-header">
                <span class="comment-author">Менеджер AntiFrog</span>
                <span class="comment-date">${cm.date}</span>
              </div>
              <div class="comment-text">${cm.text}</div>
            </div>
          </div>`).join('')}
        </div>
        <div class="comment-input">
          <input type="text" class="form-input" id="newComment" placeholder="Добавить комментарий...">
          <button onclick="addDetailComment()" class="btn btn-primary btn-sm">+</button>
        </div>
      </div>`;
  }

  gsap.from('#detailContent > *', { opacity: 0, y: 15, duration: 0.3 });
}

function addDetailComment() {
  const input = document.getElementById('newComment');
  const text = input.value.trim();
  if (!text || !currentDetail) return;
  const cases = getCases();
  if (cases[currentDetail.num]) {
    if (!cases[currentDetail.num].comments) cases[currentDetail.num].comments = [];
    cases[currentDetail.num].comments.push({ date: new Date().toLocaleString('ru-RU'), text });
    saveCases(cases);
  }
  currentDetail.comments.push({ date: new Date().toLocaleString('ru-RU'), text });
  showDetailTab('comments', document.querySelector('.detail-tab:last-child'));
  input.value = '';
}

// INIT
ALL_CLIENTS = genClients(1200);
filteredClients = ALL_CLIENTS;

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key==='Enter') startSearch(); });

const urlCase = new URLSearchParams(location.search).get('case');
if (urlCase) {
  document.getElementById('searchInput').value = urlCase;
  startSearch();
} else {
  renderTable(ALL_CLIENTS);
  document.getElementById('resultsInfo').classList.remove('hidden');
  document.getElementById('resultCount').textContent = `В базе: ${ALL_CLIENTS.length} дел`;
}
</script>
</body>
