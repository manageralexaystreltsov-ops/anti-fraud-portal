<section class="section" style="padding-top:24px">

<!-- Detail Modal -->

<script src="js/common.js"></script>

const PLATFORMS = ['TradePro Global','InvestMarket24','CryptoInvest KZ','GlobalFX Trading','Premium Binary','AlgoTrade 360','SmartInvest Pro','Quantum Capital','Titan FX Group','EuroTrade Solutions','Nordic Invest Bank','CryptoHarvest','AsiaPacific Markets','Royal Forex Club','Prime Capital Group','SwiftTrade Pro','Global Crypto Alliance','Elite Financial Hub','AutoTrade Robot','Phoenix Invest','Digital Assets Kazakhstan','Binario Premium','MegaFX Global','TrustFund Capital','Alpha Trading Group','SilverLine Markets','Zenith Crypto Fund','ProFX International','Golden Eagle Finance','Vanguard Crypto','MatrixTrade AI','EuroPacific Securities','CryptoSphere Global','Atlas Financial Corp','Quantum Leap Trading','Sunrise Capital KZ','NordFX Solutions','Baltic Trade House','Pacific Wealth Group','Crown Forex Academy','Horizon Digital Assets','Caspian Invest Group','Nomad Crypto Fund','Steppe Capital KZ','Astana Digital Bank'];

function generateClients(count) {
  const clients = [];
  for (let i = 0; i < count; i++) {
    const first = FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)];
    const last = LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)];
    const father = FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)] + 'ович' + (Math.random() > 0.5 ? '' : '');
    const iin = String(Math.floor(100000000000 + Math.random() * 899999999999));
    const phone = '+7 (' + (700 + Math.floor(Math.random() * 100)) + ') ' + String(Math.floor(1000000 + Math.random() * 9000000)).replace(/(\d{3})(\d{2})(\d{2})/, '$1-$2-$3');
    const platform = PLATFORMS[Math.floor(Math.random() * PLATFORMS.length)];
    const stage = STAGES[Math.floor(Math.random() * STAGES.length)];
    const status = STATUSES[Math.floor(Math.random() * STATUSES.length)];
    const progress = Math.floor(Math.random() * 100);
    const city = CITIES[Math.floor(Math.random() * CITIES.length)];
    const amount = Math.floor(1500000 + Math.random() * 498500000);
    const date = new Date(2025, Math.floor(Math.random() * 12), Math.floor(1 + Math.random() * 28));
    const num = 'AF-' + String(1000 + i).padStart(4, '0') + String.fromCharCode(65 + Math.floor(Math.random() * 6)) + String.fromCharCode(65 + Math.floor(Math.random() * 6));

    clients.push({
      num, fullName: `${last} ${first} ${father}`, iin, phone, platform,
      stage, status, progress, city, amount,
      date: date.toLocaleDateString('ru-RU'),
      comments: [
        { date: date.toLocaleDateString('ru-RU'), text: 'Заявка получена' },
        ...(progress > 30 ? [{ date: new Date(date.getTime() + 86400000 * 3).toLocaleDateString('ru-RU'), text: 'Начат анализ ситуации' }] : []),
        ...(progress > 60 ? [{ date: new Date(date.getTime() + 86400000 * 7).toLocaleDateString('ru-RU'), text: 'Подана претензия в банк' }] : []),
        ...(progress >= 90 ? [{ date: new Date(date.getTime() + 86400000 * 14).toLocaleDateString('ru-RU'), text: 'Средства возвращены клиенту' }] : [])
      ]
    });
  }
  return clients;
}

function loadRealClients() {
  const cases = getCases();
  return Object.entries(cases).map(([num, c]) => ({
    num,
    fullName: c.fullName || 'Без имени',
    iin: '',
    phone: c.phone || '',
    platform: c.platform || '',
    stage: c.stage || 'Заявка',
    status: c.status || 'На рассмотрении',
    progress: c.progress || 0,
    city: '',
    amount: c.amount || 0,
    recovered: c.recovered || 0,
    date: c.time ? new Date(c.time).toLocaleDateString('ru-RU') : '',
    comments: c.comments || []
  }));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const REAL_CLIENTS = loadRealClients();
const FAKE_CLIENTS = generateClients(1200);
const ALL_CLIENTS = shuffle([...REAL_CLIENTS, ...FAKE_CLIENTS]);
document.getElementById('totalCount').textContent = `В базе: ${ALL_CLIENTS.length} дел`;

function maskPhone(p) {
  if (!p) return '***';
  const d = p.replace(/\D/g, '');
  if (d.length <= 7) return p;
  const keep = d.length - 4;
  let result = '', masked = 0;
  for (let i = 0; i < p.length; i++) {
    if (/\d/.test(p[i])) {
      if (masked < keep - 1) { result += p[i]; masked++; }
      else if (masked >= keep) result += p[i];
      else { result += '*'; masked++; }
    } else result += p[i];
  }
  return result;
}

const AVATAR_COLORS = ['#10b981','#3b82f6','#8b5cf6','#f59e0b','#ef4444','#ec4899','#06b6d4','#84cc16'];

function renderClients(list) {
  const grid = document.getElementById('clientsGrid');
  document.getElementById('filterInfo').textContent = list.length === ALL_CLIENTS.length ? 'Показаны все' : `Найдено: ${list.length}`;

  grid.innerHTML = list.slice(0, 100).map((c, i) => {
    const color = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const initials = c.fullName.split(' ').slice(0, 2).map(n => n[0]).join('');
    const statusClass = c.progress >= 80 ? 'done' : c.progress >= 40 ? 'active' : 'pending';
    return `
    <div class="client-card" onclick='showDetail(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <div class="client-avatar" style="background:${color}20;color:${color}">${initials}</div>
      <div class="client-info">
        <div class="client-name">${c.fullName}</div>
        <div class="client-meta">${c.platform}${c.city ? ' · ' + c.city : ''} · #${c.num}</div>
      </div>
      <div class="client-status ${statusClass}">${c.status}</div>
    </div>`;
  }).join('');
}

function search() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { renderClients(ALL_CLIENTS); return; }
  const found = ALL_CLIENTS.filter(c =>
    c.num.toLowerCase().includes(q) || c.fullName.toLowerCase().includes(q) || c.iin.includes(q) || c.platform.toLowerCase().includes(q)
  );
  renderClients(found);
}

function showDetail(c) {
  const color = AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)];
  const si = STAGES.indexOf(c.stage);
  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div class="client-avatar" style="width:48px;height:48px;font-size:18px;background:${color}20;color:${color}">${c.fullName.split(' ').slice(0,2).map(n=>n[0]).join('')}</div>
      <div>
        <h2 style="font-size:18px;font-weight:700">${c.fullName}</h2>
        <p style="font-size:12px;color:var(--muted)">Дело #${c.num} · ${c.date}</p>
      </div>
    </div>
    <div class="case-progress" style="margin-bottom:16px">
      <div class="case-progress-header"><span>Прогресс</span><span>${c.progress}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${c.progress}%"></div></div>
    </div>
    <div class="case-stages" style="margin-bottom:16px">
      ${STAGES.map((s,i) => `<div class="case-stage"><div class="case-stage-dot ${i<si?'done':i===si?'active':''}"></div><span class="case-stage-label">${s}</span></div>`).join('')}
    </div>
    <div class="case-details" style="margin-bottom:16px">
      <div class="case-detail"><div class="case-detail-label">ФИО</div><div class="case-detail-value">${c.fullName}</div></div>
      <div class="case-detail"><div class="case-detail-label">Телефон</div><div class="case-detail-value">${maskPhone(c.phone)}</div></div>
      <div class="case-detail"><div class="case-detail-label">Город</div><div class="case-detail-value">${c.city}</div></div>
    </div>
    <div class="case-detail" style="margin-bottom:16px"><div class="case-detail-label">Платформа</div><div class="case-detail-value">${c.platform}</div></div>
    <div class="case-detail" style="margin-bottom:16px"><div class="case-detail-label">Сумма</div><div class="case-detail-value" style="color:var(--green)">${c.amount.toLocaleString()} ₸</div></div>
    <div class="case-comments" style="margin-bottom:60px"><h4>Комментарии</h4>
      ${c.comments.map(cm => `<div class="comment"><div class="comment-date">${cm.date}</div><div class="comment-text">${cm.text}</div></div>`).join('')}
    </div>`;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal(e) { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; }

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

const urlCase = new URLSearchParams(location.search).get('case');
if (urlCase) {
  document.getElementById('searchInput').value = urlCase;
  search();
} else {
  renderClients(ALL_CLIENTS);
}
</script>
