<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход в кабинет — AntiFrog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#050505;color:#e5e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center}
.glass{background:rgba(17,17,17,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06)}
.gradient-text{background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@keyframes pulse-ring{0%{transform:scale(0.8);opacity:1}100%{transform:scale(2.5);opacity:0}}
@keyframes data-stream{0%{transform:translateY(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px);opacity:0}}
.data-line{position:absolute;font-family:monospace;font-size:10px;color:rgba(16,185,129,0.4);white-space:nowrap;animation:data-stream 3s linear infinite}
.search-animation{display:none}
.search-animation.active{display:block}
.registries-list{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:11px;color:rgba(16,185,129,0.6)}
.registries-list .item{padding:6px 10px;background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.1);border-radius:6px;text-align:center;opacity:0;transform:scale(0.9)}
.registries-list .item.found{border-color:rgba(16,185,129,0.4);background:rgba(16,185,129,0.1);color:#10b981}
.progress-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin:16px 0}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,#10b981,#3b82f6);border-radius:2px;width:0%;transition:width 0.3s}
</style>
</head>
<body>

<div class="w-full max-w-md px-6">
  <!-- Login Form -->
  <div id="loginForm" class="glass rounded-3xl p-8 md:p-10">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-500 to-blue-500 flex items-center justify-center font-black text-white text-2xl mx-auto mb-4">A</div>
      <h1 class="text-2xl font-black mb-2">Кабинет клиента</h1>
      <p class="text-gray-500 text-sm">Введите данные для входа в систему</p>
    </div>

    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Номер дела, ИНН или телефон</label>
        <input type="text" id="loginInput" placeholder="Например: 12345 или 77019993430" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-emerald-500 transition text-lg">
      </div>
    </div>

    <button onclick="startLogin()" id="loginBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg transition-all hover:scale-[1.02] hover:shadow-lg hover:shadow-emerald-500/20">
      Войти
    </button>

    <p class="text-center text-gray-600 text-xs mt-6">Нет аккаунта? <a href="../#apply" class="text-emerald-500 hover:text-emerald-400">Подайте заявку</a></p>
  </div>

  <!-- Search Animation -->
  <div id="searchAnimation" class="search-animation glass rounded-3xl p-8 md:p-10 relative overflow-hidden">
    <div id="dataStreams"></div>

    <div class="relative z-10 text-center">
      <div class="w-16 h-16 rounded-full border-2 border-emerald-500/30 flex items-center justify-center mx-auto mb-6 relative">
        <div class="absolute inset-0 rounded-full border-2 border-emerald-500" style="animation:pulse-ring 2s ease-out infinite"></div>
        <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>

      <h2 class="text-xl font-bold mb-2" id="animTitle">Поиск в базе данных...</h2>
      <p class="text-gray-500 text-sm mb-6" id="animSubtitle">Сканирование реестров</p>

      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>

      <div class="registries-list mb-6" id="registriesList">
        <div class="item">АРРФР</div>
        <div class="item">finreg.kz</div>
        <div class="item">e-gov.kz</div>
        <div class="item">НБК РК</div>
        <div class="item">КГД МФ РК</div>
        <div class="item">sud.kz</div>
        <div class="item">rka.kz</div>
        <div class="item">Банки РК</div>
        <div class="item">ЦБ РК</div>
      </div>

      <div id="searchResult" class="hidden">
        <div class="w-16 h-16 rounded-full bg-emerald-500/20 flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h3 class="text-lg font-bold mb-2">Данные найдены!</h3>
        <p class="text-gray-400 text-sm mb-6">Загрузка вашего кабинета...</p>
        <button onclick="goToDashboard()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold transition-all hover:scale-105">Перейти в кабинет</button>
      </div>
    </div>
  </div>
</div>

<script>
let loginValue = '';

function startLogin() {
  loginValue = document.getElementById('loginInput').value.trim();
  if (!loginValue) {
    gsap.to('#loginInput', { x: [-10, 10, -10, 10, 0], duration: 0.4 });
    return;
  }

  document.getElementById('loginForm').style.display = 'none';
  const anim = document.getElementById('searchAnimation');
  anim.classList.add('active');
  gsap.from(anim, { opacity: 0, scale: 0.95, duration: 0.5 });

  createDataStreams();
  runSearchAnimation();
}

function createDataStreams() {
  const container = document.getElementById('dataStreams');
  const chars = '0123456789ABCDEF';
  for (let i = 0; i < 20; i++) {
    const line = document.createElement('div');
    line.className = 'data-line';
    let text = '';
    for (let j = 0; j < 30; j++) text += chars[Math.floor(Math.random() * chars.length)];
    line.textContent = text;
    line.style.left = Math.random() * 100 + '%';
    line.style.top = Math.random() * 100 + '%';
    line.style.animationDelay = Math.random() * 3 + 's';
    line.style.animationDuration = (2 + Math.random() * 2) + 's';
    container.appendChild(line);
  }
}

function runSearchAnimation() {
  const items = document.querySelectorAll('#registriesList .item');
  const progress = document.getElementById('progressFill');
  const title = document.getElementById('animTitle');
  const subtitle = document.getElementById('animSubtitle');

  const steps = [
    { pct: 15, title: 'Подключение к АРРФР...', sub: 'Проверка лицензий', items: [0, 1] },
    { pct: 30, title: 'Сканирование e-gov.kz...', sub: 'Поиск по государственным реестрам', items: [2, 3] },
    { pct: 45, title: 'Проверка налоговых данных...', sub: 'КГД МФ РК', items: [4, 5] },
    { pct: 60, title: 'Анализ судебных дел...', sub: 'sud.kz, rka.kz', items: [6, 7] },
    { pct: 80, title: 'Сверка с банками РК...', sub: 'Halyk, Kaspi, ЦБ', items: [8] },
    { pct: 100, title: 'Данные найдены!', sub: 'Ваш кабинет готов', items: [] }
  ];

  steps.forEach((step, i) => {
    setTimeout(() => {
      progress.style.width = step.pct + '%';
      title.textContent = step.title;
      subtitle.textContent = step.sub;
      step.items.forEach(idx => {
        if (items[idx]) {
          items[idx].classList.add('found');
          gsap.to(items[idx], { opacity: 1, scale: 1, duration: 0.3 });
        }
      });
      if (step.pct === 100) {
        setTimeout(() => {
          document.getElementById('searchResult').classList.remove('hidden');
          gsap.from('#searchResult', { opacity: 0, y: 20, duration: 0.5 });
        }, 500);
      }
    }, (i + 1) * 800);
  });
}

function goToDashboard() {
  localStorage.setItem('antifrog_client', loginValue);
  window.location.href = 'dashboard.html';
}

document.getElementById('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') startLogin(); });
</script>
</body>
</html>
