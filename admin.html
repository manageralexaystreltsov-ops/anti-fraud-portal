<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin — AntiFrog</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="section" style="padding-top:32px">
  <div class="container" style="max-width:800px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h1 style="font-size:24px;font-weight:900">⚙️ Админ-панель</h1>
      <a href="/" style="font-size:13px;color:var(--muted)">← Сайт</a>
    </div>

    <div class="admin-tabs">
      <div class="admin-tab active" onclick="showTab('list')">📋 Заявки</div>
      <div class="admin-tab" onclick="showTab('add')">➕ Добавить</div>
      <div class="admin-tab" onclick="showTab('info')">🤖 Бот</div>
    </div>

    <div id="tabList">
      <div id="casesList"></div>
    </div>

    <div id="tabAdd" class="hidden">
      <div class="card card-lg">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Добавить дело</h2>
        <div class="form-row">
          <div class="form-group"><label class="form-label">ФИО</label><input class="form-input" id="aName"></div>
          <div class="form-group"><label class="form-label">ИИН</label><input class="form-input" id="aIin" maxlength="12"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Телефон</label><input class="form-input" id="aPhone"></div>
          <div class="form-group"><label class="form-label">Платформа</label><input class="form-input" id="aPlatform"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Этап</label>
            <select class="form-input" id="aStage"><option>Заявка</option><option>Анализ</option><option>Претензия</option><option>Возврат</option></select>
          </div>
          <div class="form-group"><label class="form-label">Прогресс %</label><input type="number" class="form-input" id="aProgress" value="10"></div>
        </div>
        <button onclick="addCase()" class="btn btn-primary">+ Добавить</button>
      </div>
    </div>

    <div id="tabInfo" class="hidden">
      <div class="card card-lg">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Telegram бот</h2>
        <div style="background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px">
          <p style="font-size:12px;color:var(--muted)">Бот</p>
          <p style="font-family:monospace">@finmanager_check_bot</p>
        </div>
        <div style="background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px">
          <p style="font-size:12px;color:var(--muted)">Chat ID</p>
          <p style="font-family:monospace">8471070560</p>
        </div>
        <div style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:16px">
          <p style="font-size:13px;color:var(--green)">✅ Заявки с сайта приходят в Telegram автоматически</p>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="js/common.js"></script>
<script>
function showTab(t) {
  ['List','Add','Info'].forEach(id => document.getElementById('tab'+id).classList.add('hidden'));
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
  document.querySelectorAll('.admin-tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  if (t === 'list') renderCases();
}

function renderCases() {
  const cases = getCases();
  const el = document.getElementById('casesList');
  const entries = Object.entries(cases);
  if (!entries.length) { el.innerHTML = '<div class="card text-center" style="padding:32px;color:var(--muted)">Нет заявок</div>'; return; }
  el.innerHTML = entries.map(([n, c]) => `
    <div class="card" style="padding:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="editCase('${n}')">
      <div>
        <p style="font-weight:700">${c.fullName||'Без имени'}</p>
        <p style="font-size:12px;color:var(--muted)">${c.platform||'?'} · ${c.stage} · ${c.progress}%</p>
      </div>
      <span style="font-size:11px;padding:4px 10px;background:${c.progress>=50?'rgba(16,185,129,0.1)':'rgba(245,158,11,0.1)'};color:${c.progress>=50?'var(--green)':'var(--gold)'};border-radius:8px;font-weight:600">${c.status}</span>
    </div>
  `).join('');
}

function editCase(num) {
  const cases = getCases();
  const c = cases[num];
  const s = prompt(`Статус для #${num}:\nТекущий: ${c.status}`, c.status);
  if (s && s !== c.status) {
    c.status = s;
    if (!c.comments) c.comments = [];
    c.comments.push({ date: new Date().toLocaleString('ru-RU'), text: 'Статус: ' + s });
    cases[num] = c; saveCases(cases); renderCases(); showToast('Обновлено');
  }
}

function addCase() {
  const num = 'AF-' + Date.now().toString(36).toUpperCase().slice(-6);
  const cases = getCases();
  cases[num] = {
    fullName: document.getElementById('aName').value.trim(),
    iin: document.getElementById('aIin').value.trim(),
    phone: document.getElementById('aPhone').value.trim(),
    platform: document.getElementById('aPlatform').value.trim(),
    stage: document.getElementById('aStage').value,
    progress: parseInt(document.getElementById('aProgress').value)||10,
    status: 'На рассмотрении',
    comments: [{ date: new Date().toLocaleString('ru-RU'), text: 'Создано администратором' }]
  };
  saveCases(cases); showToast('Добавлено: ' + num); showTab('list');
}

renderCases();
</script>
</body>
</html>
